serenity {
    project.name = "Automatizacion Falabella"
    test.root = "features"
    tag.failures = "true"
    outputDirectory = target/site/serenity
}

webdriver {
    driver = chrome
    autodownload = true
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized", "incognito"]
        }
    }
}